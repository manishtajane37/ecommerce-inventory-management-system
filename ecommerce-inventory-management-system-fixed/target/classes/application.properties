# ==============================
# Application Info
# ==============================
spring.application.name=inventory


# ==============================
# MySQL Database Configuration
# ==============================

spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_inventory?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

spring.datasource.username=root

# Put your MySQL Workbench password here
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ==============================
# JPA / Hibernate Configuration
# ==============================

# Automatically create/update tables
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console
spring.jpa.show-sql=true

# Format SQL output
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.open-in-view=false


# ==============================
# JWT Configuration
# ==============================

jwt.secret=ThisIsASecretKeyForJWTAuthenticationChangeMeInProduction123456

jwt.expiration-ms=86400000


# ==============================
# Server Configuration
# ==============================

server.port=8080